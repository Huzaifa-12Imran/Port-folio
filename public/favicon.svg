<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Cinematic Background -->
  <rect width="512" height="512" rx="110" fill="#0a0a0a"/>
  
  <!-- Subtle Gradient Accent -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c5a059;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b08d48;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Number 33 (Stylized/Geometric) -->
  <g fill="url(#goldGrad)" filter="url(#glow)">
    <!-- First '3' -->
    <path d="M110 160h120v45h-75v50h75v45h-75v50h75v45H110V160z" />
    <!-- Second '3' -->
    <path d="M282 160h120v45h-75v50h75v45h-75v50h75v45H282V160z" />
  </g>

  <!-- Crimson Technical Accent Line -->
  <rect x="0" y="470" width="512" height="15" fill="#8b0000" />
  <rect x="0" y="495" width="512" height="8" fill="#8b0000" opacity="0.6" />
</svg>